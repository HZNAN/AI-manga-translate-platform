spring:
  ai:
    openai:
      enabled: false
    ollama:
      enabled: false
    zhipuai:
      enabled: false
    deepseek:
      enabled: false
    google:
      genai:
        enabled: false
  application:
    name: manga-reader
  datasource:
    url: jdbc:postgresql://localhost:5432/manga_translate
    username: postgres
    password: YOUR_DB_PASSWORD
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB
  rabbitmq:
    host: localhost
    port: 5672
    username: YOUR_RABBITMQ_USER
    password: YOUR_RABBITMQ_PASSWORD
    listener:
      simple:
        prefetch: 1
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 5000
          multiplier: 2.0
          max-interval: 30000
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-handlers-package: com.hznan.mamgareader.handler
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  tomcat:
    connection-timeout: 300s

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: INFO
    com.hznan.mamgareader: DEBUG  # 你的项目包名，方便调试
    org.springframework.web: INFO
    org.mybatis: DEBUG            # 开启 MyBatis 日志
    com.baomidou.mybatisplus: DEBUG # 开启 MyBatis-Plus 日志
    org.postgresql: INFO          # 数据库日志

app:
  jwt:
    secret: YOUR_JWT_SECRET
    expiration-ms: 86400000
  storage:
    base-path: ./manga-data
  translator:
    api-base: YOUR_PYTHON_SERVICE_URL
  ollama:
    base-url: YOUR_OLLAMA_SERVICE_URL
  rate-limit:
    capacity: 10
    tokens-per-second: 2
